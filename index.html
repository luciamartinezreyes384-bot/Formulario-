<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Básico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .demo-form-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            max-width: 350px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h3 {
            text-align: center;
            color: #333;
        }

        p {
            text-align: center;
            color: #666;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
            color: #333;
        }
    </style>
</head>
<body>

<section class="demo-form-card">
  <h3>Formulario básico</h3>
  <p>Completa los campos y presiona el botón.</p>

  <form>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre">

    <label for="edad">Edad:</label>
    <input type="number" id="edad" placeholder="Escribe tu edad">

    <button type="button" onclick="mostrarDatos()">Mostrar datos</button>
  </form>

  <div id="resultado" class="resultado">
    Aquí aparecerá la información capturada.
  </div>
</section>

<script>
function mostrarDatos() {
    const nombre = document.getElementById('nombre').value;
    const edad = document.getElementById('edad').value;
    const resultado = document.getElementById('resultado');

    if (nombre && edad) {
        resultado.innerHTML = `Nombre: ${nombre}<br>Edad: ${edad} años`;
    } else {
        resultado.innerHTML = "Por favor, llena todos los campos.";
    }
}
</script>

</body>
</html>
